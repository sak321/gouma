name: 自动拉取反代IP(新仓库专属完美版)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4.2.2

    - name: Set up Python
      uses: actions/setup-python@v5.4.0
      with:
        python-version: '3.10'

    - name: Create and Run Script
      run: |
        cat << 'EOF' > temp_script.py
        import os
        import json
        import urllib.request
        import urllib.error

        def fetch_data_from_url(url):
            try:
                request_headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}
                req = urllib.request.Request(url, headers=request_headers)
                with urllib.request.urlopen(req, timeout=20) as response:
                    return response.read().decode('utf8')
            except Exception as e:
                print(f"读取源失败: {url} 详情: {e}")
                return None

        def generate_vless_from_api():
            TARGET_ASNS = {36002, 8143}
            seen_ips = set()
            final_links = []
            counter = 0

            print("正在同步源一 (CM-JSON)...")
            json_data = fetch_data_from_url("https://zip.cm.edu.kg/all.json")
            if json_data:
                try:
                    raw_data = json.loads(json_data)
                    node_data_list = []
                    if isinstance(raw_data, list): node_data_list = raw_data
                    elif isinstance(raw_data, dict):
                        for k, v in raw_data.items():
                            if isinstance(v, list): node_data_list.extend(v)
                    
                    for item in node_data_list:
                        if not isinstance(item, dict): continue
                        meta_data = item.get("meta", {})
                        asn = meta_data.get("asn")
                        if asn not in TARGET_ASNS: continue
                        
                        port = item.get("_port") or meta_data.get("_port") or (item.get("port")[0] if isinstance(item.get("port"), list) and item.get("port") else 443)
                        country = meta_data.get("country", "US")
                        org_name = "狗妈" if asn == 36002 else "奶爸"
                        
                        v4_ip = item.get("ip")
                        if v4_ip and v4_ip not in seen_ips:
                            seen_ips.add(v4_ip)
                            counter += 1
                            final_links.append(f"{v4_ip}:{port}#CM_{org_name}_{country}_{counter:02d}")
                except Exception as je:
                    print(f"解析源一失败: {je}")

            print("正在同步源二 (全量精品库)...")
            txt_data = fetch_data_from_url("https://raw.githubusercontent.com/Alvin9999/new-pac/master/Cloudflare/all.txt")
            if txt_data:
                lines = txt_data.splitlines()
                for line in lines:
                    line = line.strip()
                    if not line or "#" not in line: continue
                    lower_line = line.lower()
                    if "gomami" in lower_line or "as36002" in lower_line:
                        org_name = "狗妈"
                    elif "neburst" in lower_line or "as8143" in lower_line:
                        org_name = "奶爸"
                    else:
                        continue
                    
                    try:
                        parts = line.split("#")[0].strip()
                        if ":" in parts:
                            ip, port = parts.split(":")[0], parts.split(":")[1]
                            if ip not in seen_ips:
                                seen_ips.add(ip)  # 🛠️ 已经修复这里的拼写错误
                                counter += 1
                                final_links.append(f"{ip}:{port}#CM_{org_name}_US_{counter:02d}")
                    except Exception:
                        continue

            total_links = len(final_links)
            if total_links == 0: 
                print("未搜寻到活跃的狗妈/奶爸IP")
                return

            output_filename = "vless_api_all.txt"
            with open(output_filename, 'w', encoding='utf8') as out_f:
                for link in final_links: out_f.write(link + "\n")
            print(f"【精准拦截成功】共洗出 {total_links} 个独立优选IP。")

        if __name__ == "__main__":
            generate_vless_from_api()
        EOF
        python temp_script.py

    # 4. 强制推送覆盖远程
    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add vless_api_all.txt
        git commit --allow-empty -m "自动刷新狗妈奶爸专属IP包"
        git push --force origin HEAD:main
